# ================================
# SERVERLESS CONFIGURATION
# ================================
#
# This serverless.yml configures a complete serverless application with:
# - Lambda functions for API endpoints (bundled with serverless-esbuild)
# - S3 buckets for client files and assets
# - CloudFront distribution for global CDN
# - Route 53 for custom domain routing
# - Cognito for authentication
#
# DEPLOYMENT NOTES:
# 1. SSL Certificates - CREATE MANUALLY in ACM (us-east-1 region):
#    - Create certificate for your domain (add ARN to CERTIFICATE_ARN)
# 2. Ensure you have a Route 53 hosted zone for the domain
# 3. Deploy stages separately:
#    - DEV:  npm run deploy:dev
#    - QA:   npm run deploy:qa
#    - PROD: npm run deploy:prod
# 4. Each stage gets its own complete infrastructure:
#    - Separate CloudFront distributions with custom domains
#    - Separate S3 buckets
#    - Separate API Gateways
#    - Separate Route 53 records
#    - Separate Cognito User Pools
# 5. After deployment, upload your React build files to the stage-specific client bucket
# 6. Upload assets (images, PDFs, icons, etc.) to the stage-specific assets bucket under the /media/ path
#
# DEVELOPMENT:
#   npm run dev          - Run offline against dev stage (esbuild watches and recompiles on save)
#   npm run qa           - Run offline against qa stage
#   npm run prod         - Run offline against prod stage
#   npm run deploy:dev   - Deploy to AWS (dev stage)
#
# ================================
org: shalev396

app: ${self:custom.appName}

service: ${self:custom.appName}

frameworkVersion: ^4.0.0

provider:
  name: aws
  stage: ${opt:stage}
  runtime: nodejs22.x
  timeout: 30
  memorySize: 160
  region: ${env:AWS_REGION}
  logRetentionInDays: 30

  apiGateway:
    shouldStartNameWithService: true
  logs:
    restApi: false
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - https://${env:DOMAIN_NAME}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      allowCredentials: true
      maxAge: 86400
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl:
          Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
        audience:
          - Ref: CognitoUserPoolClient

  environment:
    ENV: ${opt:stage}
    DATABASE_URL: ${env:DATABASE_URL}
    DATABASE_PROVIDER: ${env:DATABASE_PROVIDER}
    S3_ASSETS_BUCKET_NAME: ${self:custom.assetsBucketName}
    S3_CLIENT_BUCKET_NAME: ${self:custom.clientBucketName}
    COGNITO_CLIENT_ID: ${self:custom.cognitoEnv.clientId}
    COGNITO_USER_POOL_ID: ${self:custom.cognitoEnv.userPoolId}
    COGNITO_ISSUER: ${self:custom.cognitoEnv.issuer}
    DOMAIN_NAME: ${env:DOMAIN_NAME}

  iam:
    role:
      statements:
        # Cognito Permissions
        - Effect: Allow
          Action:
            - cognito-idp:AdminDeleteUser
            - cognito-idp:ListUsers
          Resource:
            - arn:aws:cognito-idp:${self:provider.region}:*:userpool/*

        # S3 Permissions - Assets bucket
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - 'arn:aws:s3:::${self:custom.assetsBucketName}'
            - 'arn:aws:s3:::${self:custom.assetsBucketName}/*'

        # SES Permissions - Email sending
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource:
            - 'arn:aws:ses:${self:provider.region}:*:identity/*'

# Package Configuration
package:
  individually: true

# Disable native esbuild (using serverless-esbuild plugin instead)
build:
  esbuild: false

# Serverless Plugins
plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-offline-watcher
  - serverless-prune-plugin

# Custom Configuration
custom:
  appName: elytra
  appDisplayName: Elytra

  # Enable dev API (DB sync, reset, etc.) for dev/qa only. Prod always false.
  # Override with ENABLE_DEV_TOOLS env var if needed.
  enableDevToolsByStage:
    dev: 'true'
    qa: 'true'
    prod: 'false'
  enableDevTools: ${env:ENABLE_DEV_TOOLS, self:custom.enableDevToolsByStage.${opt:stage}, 'false'}

  devApiEvents:
    'true':
      - httpApi:
          path: /api/dev/{proxy+}
          method: ANY
    'false': []

  clientBucketName: ${env:DOMAIN_NAME}
  assetsBucketName: ${env:DOMAIN_NAME}-assets

  # SES/Cognito: sender address and SES identity ARN for Cognito email (DEVELOPER mode)
  cognitoFromEmail: authenticator@${env:DOMAIN_NAME}
  sesIdentityArn: arn:aws:ses:${self:provider.region}:${env:AWS_ACCOUNT_ID}:identity/${env:DOMAIN_NAME}

  local: ${param:local, 'false'}

  esbuild:
    bundle: true
    minify: true
    platform: node
    target: node22
    format: esm
    outputFileExtension: '.mjs'
    banner:
      js: "import{createRequire}from'module';const require=createRequire(import.meta.url);"
    exclude:
      - '@aws-sdk/*'
      - 'aws-sdk'
    watch:
      pattern: 'src/**/*.ts'

  cognitoEnv: ${self:custom.cognitoEnvConfig.${self:custom.local}}
  cognitoEnvConfig:
    'true':
      clientId: ${env:COGNITO_CLIENT_ID, ''}
      userPoolId: ${env:COGNITO_USER_POOL_ID, ''}
      issuer: ${env:COGNITO_ISSUER, ''}
    'false':
      clientId:
        Ref: CognitoUserPoolClient
      userPoolId:
        Ref: CognitoUserPool
      issuer:
        Fn::Sub: 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}'

  viewerCertificate:
    AcmCertificateArn: ${env:CERTIFICATE_ARN}
    SslSupportMethod: sni-only
    MinimumProtocolVersion: TLSv1.2_2021

  distributionComment:
    dev: '${self:custom.appDisplayName} Development'
    qa: '${self:custom.appDisplayName} QA'
    prod: '${self:custom.appDisplayName} Production'

  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noPrependStageInUrl: true
    reloadHandler: false
    disableCookieValidation: true
    enforceSecureCookies: false
    printOutput: true
    noAuth: true

  serverless-offline-watcher:
    - path:
        - .esbuild/.build/**/*
      hook: offline:functionsUpdated

  prune:
    automatic: true
    number: 5
    includeLayers: true

  envFile: .env.${sls:stage}

# Lambda Functions
functions:
  # PUBLIC: Authentication & Health (no auth required)
  publicApi:
    handler: src/handlers/api/public-handler.handler
    timeout: 30
    memorySize: 256
    events:
      - httpApi:
          path: /api/public/{proxy+}
          method: ANY

  # PRIVATE: All authenticated user operations (auth required)
  # Timeout/memory higher for export (ZIP creation) and delete operations
  privateApi:
    handler: src/handlers/api/private-handler.handler
    timeout: 30
    memorySize: 1024
    events:
      - httpApi:
          path: /api/private/{proxy+}
          method: ANY
          authorizer:
            name: cognitoAuthorizer

  # DEV: Developer tools (DB sync, etc.)
  # Controlled by custom.enableDevTools — when false, no HTTP event is attached (untriggerable)
  devApi:
    handler: src/handlers/api/dev-handler.handler
    timeout: 30
    memorySize: 256
    events: ${self:custom.devApiEvents.${self:custom.enableDevTools}}

  # SYNC-DB: Standalone Lambda for CI/CD database migrations (no HTTP event)
  syncDb:
    handler: src/handlers/scripts/sync-db.handler
    timeout: 60
    memorySize: 256

# AWS Resources Configuration
resources:
  Description: ${self:custom.appDisplayName} full-stack application — Lambda API, S3-hosted client, CloudFront CDN, Route 53 DNS, and Cognito authentication (${self:provider.stage})
  Resources:
    # ================================
    # S3 BUCKETS CONFIGURATION
    # ================================

    # S3 Bucket for Client Files (React Vite Build)
    ClientFilesBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.clientBucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              Status: Enabled
              NoncurrentVersionExpirationInDays: 30
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, HEAD]
              AllowedOrigins: ['*']
              MaxAge: 3600

    # S3 Bucket Policy for Client Files
    ClientFilesBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: ClientFilesBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource:
                - Fn::Join:
                    - ''
                    - - 'arn:aws:s3:::'
                      - Ref: ClientFilesBucket
                      - '/*'

    # S3 Bucket for Assets/Images
    AssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.assetsBucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              Status: Enabled
              NoncurrentVersionExpirationInDays: 30
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, HEAD, PUT, POST, DELETE]
              AllowedOrigins: ['*']
              MaxAge: 3600

    # S3 Bucket Policy for Assets
    AssetsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: AssetsBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource:
                - Fn::Join:
                    - ''
                    - - 'arn:aws:s3:::'
                      - Ref: AssetsBucket
                      - '/*'

    # ================================
    # CLOUDFRONT DISTRIBUTION
    # ================================

    CloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      DependsOn:
        - SesDkimRecord1
        - SesDkimRecord2
        - SesDkimRecord3
      Properties:
        DistributionConfig:
          Comment: ${self:custom.distributionComment.${self:provider.stage}}
          Enabled: true

          Aliases:
            - ${env:DOMAIN_NAME}

          ViewerCertificate: ${self:custom.viewerCertificate}

          # Map GET / to /index.html at the origin (deep links use S3 website ErrorDocument).
          DefaultRootObject: index.html

          # Default: React app from S3 website endpoint (IndexDocument / ErrorDocument apply).
          DefaultCacheBehavior:
            TargetOriginId: ClientFilesOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized (matches AssetsOrigin /media/*)
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # Managed-CORS-S3Origin

          CacheBehaviors:
            # API Gateway behavior - /api/* routes to API Gateway
            - PathPattern: '/api/*'
              TargetOriginId: ApiGatewayOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
              CachedMethods: [GET, HEAD, OPTIONS]
              Compress: true
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # Managed-CachingDisabled
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # Managed-AllViewerExceptHostHeader

            # Assets behavior - /media/* routes to assets bucket (images, PDFs, icons, etc.)
            - PathPattern: '/media/*'
              TargetOriginId: AssetsOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods: [GET, HEAD, OPTIONS]
              CachedMethods: [GET, HEAD, OPTIONS]
              Compress: true
              CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # Managed-CachingOptimized
              OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # Managed-CORS-S3Origin

          Origins:
            # S3 static website hostname — WebsiteConfiguration applies; REST endpoint ignores index/error docs.
            - Id: ClientFilesOrigin
              DomainName:
                Fn::Select:
                  - 1
                  - Fn::Split:
                      - '//'
                      - Fn::GetAtt:
                          - ClientFilesBucket
                          - WebsiteURL
              CustomOriginConfig:
                HTTPPort: 80
                HTTPSPort: 443
                OriginProtocolPolicy: http-only
                OriginSSLProtocols: [TLSv1.2]

            # Origin for assets (S3 bucket — images, PDFs, icons, etc.)
            - Id: AssetsOrigin
              DomainName:
                Fn::GetAtt:
                  - AssetsBucket
                  - RegionalDomainName
              S3OriginConfig:
                OriginAccessIdentity: ''

            # Origin for API Gateway
            - Id: ApiGatewayOrigin
              DomainName:
                Fn::Sub: '${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
              CustomOriginConfig:
                HTTPPort: 443
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
                OriginSSLProtocols: [TLSv1.2]

          # No CustomErrorResponses: distribution-wide 403/404 -> index.html would mask API Gateway errors on /api/*.

          PriceClass: PriceClass_All
          HttpVersion: http2
          IPV6Enabled: true

    # ================================
    # ROUTE 53 CONFIGURATION
    # ================================

    Route53Record:
      Type: AWS::Route53::RecordSet
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name: ${env:DOMAIN_NAME}
        Type: A
        AliasTarget:
          DNSName:
            Fn::GetAtt:
              - CloudFrontDistribution
              - DomainName
          HostedZoneId: Z2FDTNDATAQYW2 # CloudFront hosted zone ID (global constant)
          EvaluateTargetHealth: false

    # ================================
    # COGNITO USER POOL
    # ================================

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      DependsOn:
        - SesDkimRecord1
        - SesDkimRecord2
        - SesDkimRecord3
        - CloudFrontDistribution
        - Route53Record
      Properties:
        UserPoolName: ${self:custom.appName}-${self:provider.stage}
        UserPoolTier: ESSENTIALS
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Schema:
          - Name: email
            AttributeDataType: String
            Required: true
            Mutable: false
          - Name: name
            AttributeDataType: String
            Required: false
            Mutable: true
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
        EmailConfiguration:
          EmailSendingAccount: DEVELOPER
          From: ${self:custom.cognitoFromEmail}
          SourceArn: ${self:custom.sesIdentityArn}
        VerificationMessageTemplate:
          DefaultEmailOption: CONFIRM_WITH_CODE
          EmailSubject: '${self:custom.appDisplayName} — Verify your email'
          EmailMessage: ${file(./email-templates/cognito-verification.html)}
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1
        UserPoolAddOns:
          AdvancedSecurityMode: OFF

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:custom.appName}-${self:provider.stage}-client
        UserPoolId:
          Ref: CognitoUserPool
        GenerateSecret: false
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        EnableTokenRevocation: true
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days
        ReadAttributes:
          - email
          - name
          - email_verified
        WriteAttributes:
          - email
          - name

    # ================================
    # SES EMAIL IDENTITY & DKIM
    # ================================

    SesDomainIdentity:
      Type: AWS::SES::EmailIdentity
      Properties:
        EmailIdentity: ${env:DOMAIN_NAME}
        DkimSigningAttributes:
          NextSigningKeyLength: RSA_2048_BIT
        DkimAttributes:
          SigningEnabled: true

    SesDkimRecord1:
      Type: AWS::Route53::RecordSet
      DependsOn: SesDomainIdentity
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name:
          Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenName1]
        Type: CNAME
        TTL: 300
        ResourceRecords:
          - Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenValue1]

    SesDkimRecord2:
      Type: AWS::Route53::RecordSet
      DependsOn: SesDomainIdentity
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name:
          Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenName2]
        Type: CNAME
        TTL: 300
        ResourceRecords:
          - Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenValue2]

    SesDkimRecord3:
      Type: AWS::Route53::RecordSet
      DependsOn: SesDomainIdentity
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID}
        Name:
          Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenName3]
        Type: CNAME
        TTL: 300
        ResourceRecords:
          - Fn::GetAtt: [SesDomainIdentity, DkimDNSTokenValue3]

  Outputs:
    CognitoUserPoolId:
      Description: Cognito User Pool ID
      Value:
        Ref: CognitoUserPool
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-UserPoolId

    CognitoClientId:
      Description: Cognito User Pool Client ID
      Value:
        Ref: CognitoUserPoolClient
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-ClientId

    CognitoIssuer:
      Description: Cognito Token Issuer URL
      Value:
        Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-Issuer

    CognitoFromEmail:
      Description: SES sender address for Cognito
      Value: ${self:custom.cognitoFromEmail}

    CloudFrontDistributionId:
      Description: CloudFront Distribution ID for cache invalidation
      Value:
        Ref: CloudFrontDistribution
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-CloudFrontDistributionId

    S3ClientBucketName:
      Description: S3 Client Bucket Name for frontend deployment
      Value:
        Ref: ClientFilesBucket
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-S3ClientBucketName

    S3AssetsBucketName:
      Description: S3 Assets Bucket Name
      Value:
        Ref: AssetsBucket
      Export:
        Name: ${self:custom.appName}-${self:provider.stage}-S3AssetsBucketName
