[pytest]
testpaths = tests/e2e
addopts = -v --browser chromium
python_files = test_*.py *_test.py smoke.py accessibility.py visual.py responsive.py security.py performance.py critical.py translations.py
markers =
    smoke: Smoke tests (run on every PR)
    flow: Critical user flows
    a11y: Accessibility tests
    visual: Visual regression tests
    responsive: Responsive behavior tests
    security: Security-adjacent browser checks
    performance: Performance budget tests
    cross_browser: Cross-browser tests (run with --browser firefox etc)
