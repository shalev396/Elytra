$kind: http-request
url: '{{baseUrl}}/private/me'
method: GET
auth:
  type: inherit
  credentials:
    id: 383fc78f-96ef-47d9-81d5-e4c7dada7326
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });


      pm.test('Response has user data', function () {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property('id');
          pm.expect(json.data).to.have.property('cognitoSub');
          pm.expect(json.data).to.have.property('email');
          pm.expect(json.data).to.have.property('name');
          pm.expect(json.data).to.have.property('createdAt');
          pm.expect(json.data).to.have.property('updatedAt');
      });


      pm.test('User email matches test email', function () {
          const json = pm.response.json();
          const testEmail = pm.environment.get('testEmail') || pm.collectionVariables.get('testEmail');
          pm.expect(json.data.email).to.equal(testEmail);
      });
    language: text/javascript
order: 1000
