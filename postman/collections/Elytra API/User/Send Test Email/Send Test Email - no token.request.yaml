$kind: http-request
url: '{{baseUrl}}/user/me/test-email'
method: POST
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });

      // LOCAL: Lambda/expressAuth returns { success: false, message }.
      // QA/PROD: API Gateway Cognito authorizer rejects first, returns { message: "Unauthorized" } (no success field).

      pm.test('Response indicates failure', function () {
          const json = pm.response.json();
          const indicatesFailure = json.success === false || (pm.response.code === 401 && json.message);
          pm.expect(indicatesFailure).to.be.true;
      });
    language: text/javascript
order: 2000
