$kind: http-request
url: '{{baseUrl}}/user/me'
method: PUT
auth:
  type: noauth
body:
  type: formdata
  content:
    - type: text
      key: name
      value: Hacker User
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });

      pm.test('Response indicates failure', function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.false;
      });
    language: text/javascript
order: 3000
