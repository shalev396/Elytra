$kind: http-request
url: '{{baseUrl}}/private/me'
method: PUT
auth:
  type: inherit
  credentials:
    id: 383fc78f-96ef-47d9-81d5-e4c7dada7326
body:
  type: formdata
  content:
    - type: text
      key: name
      value: Updated Test User
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Name was updated', function () {
          const json = pm.response.json();
          pm.expect(json.data.name).to.equal('Updated Test User');
      });
    language: text/javascript
order: 1000
