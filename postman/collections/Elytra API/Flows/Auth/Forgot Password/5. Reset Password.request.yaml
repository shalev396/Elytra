$kind: http-request
url: '{{baseUrl}}/public/auth/reset-password'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{}'
scripts:
  - type: beforeRequest
    code: |-
      const email = pm.collectionVariables.get('testEmail') || pm.environment.get('testEmail');
      const code = pm.collectionVariables.get('resetCode') || pm.environment.get('resetCode');
      const newPassword = 'NewPassword1!';
      pm.request.body.raw = JSON.stringify({ email, code, password: newPassword });
      pm.collectionVariables.set('newPassword', newPassword);
      pm.environment.set('newPassword', newPassword);
      console.log('Resetting password with code:', code);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Password reset successful', function () {
          const json = pm.response.json();
      });
    language: text/javascript
order: 5000
