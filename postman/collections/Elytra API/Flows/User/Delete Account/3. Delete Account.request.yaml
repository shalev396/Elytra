$kind: http-request
url: '{{baseUrl}}/private/delete'
method: DELETE
auth:
  type: bearer
  credentials:
    token: '{{idToken}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Account deleted', function () {
          const json = pm.response.json();
          pm.expect(json.data.message).to.equal('All user data has been permanently deleted');
      });

      console.log('Flow complete - account permanently deleted');
    language: text/javascript
order: 3000
