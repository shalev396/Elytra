$kind: http-request
url: '{{baseUrl}}/user/me/export'
method: GET
auth:
  type: bearer
  credentials:
    token: '{{idToken}}'
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response is ZIP download', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/zip');
          pm.expect(pm.response.headers.get('Content-Disposition')).to.include('attachment');
      });

      pm.test('Response body is non-empty', function () {
          pm.expect(pm.response.size().body).to.be.above(0);
      });

      console.log('Flow complete - export ZIP received');
    language: text/javascript
order: 3000
