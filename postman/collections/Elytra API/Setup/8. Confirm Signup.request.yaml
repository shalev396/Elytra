$kind: http-request
url: '{{baseUrl}}/auth/confirm'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{}'
scripts:
  - type: beforeRequest
    code: |-
      const email = pm.collectionVariables.get('testEmail') || pm.environment.get('testEmail');
      const code = pm.collectionVariables.get('confirmationCode') || pm.environment.get('confirmationCode');
      pm.request.body.raw = JSON.stringify({ email, code });
      console.log('Confirming with code:', code);
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Confirmation successful', function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });

      console.log('User confirmed successfully');
    language: text/javascript
order: 8000
