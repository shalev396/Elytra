$kind: http-request
url: '{{baseUrl}}/public/auth/refresh'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "refreshToken": "invalid-refresh-token"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 401', function () {
          pm.response.to.have.status(401);
      });
    language: text/javascript
order: 2000
