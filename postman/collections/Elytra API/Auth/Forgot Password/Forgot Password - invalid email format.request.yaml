$kind: http-request
url: '{{baseUrl}}/public/auth/forgot-password'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "email": "not-an-email"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200 (anti-enumeration)', function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 4000
