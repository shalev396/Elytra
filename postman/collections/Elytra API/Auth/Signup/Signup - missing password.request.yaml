$kind: http-request
url: '{{baseUrl}}/public/auth/signup'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "email": "test@example.com",
        "name": "Test"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });
    language: text/javascript
order: 2000
