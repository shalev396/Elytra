$kind: http-request
url: '{{baseUrl}}/public/auth/signup'
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{}'
scripts:
  - type: beforeRequest
    code: |-
      const email = pm.collectionVariables.get('testEmail') || pm.environment.get('testEmail');
      const password = pm.collectionVariables.get('testPassword') || pm.environment.get('testPassword');
      pm.request.body.raw = JSON.stringify({ email, password, name: 'Duplicate Test' });
    language: text/javascript
  - type: afterResponse
    code: |-
      pm.test('Status code is 400', function () {
          pm.response.to.have.status(400);
      });
    language: text/javascript
order: 4000
