name: Documentation issue
description: Report unclear, incorrect, or missing documentation.
title: '[Docs]: '
labels: ['documentation']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Elytra's documentation.
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Where is the issue? (file path, URL, or section name)
      placeholder: e.g. README.md, client/tests/README.md, server/.env.example
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current content or behavior
      description: What does it say or do now? (or describe what's missing)
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired content or behavior
      description: What should it say or do?
    validations:
      required: true
  - type: checkboxes
    id: searched
    attributes:
      label: Checklist
      description: 'Before submitting, please confirm:'
      options:
        - label: I have searched existing Issues and Discussions for duplicates.
          required: true
