# Push to qa: deploy to QA environment (tests already passed in PR)
name: Push QA

on:
  push:
    branches: [qa]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      stage: qa
