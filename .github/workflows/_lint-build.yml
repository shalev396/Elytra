# Reusable workflow: Lint and build client + server
name: Lint & Build

on:
  workflow_call:

jobs:
  lint-build-client:
    name: Lint & Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: client
      - run: npm run lint
        working-directory: client
      - run: npm run build
        working-directory: client

  lint-build-server:
    name: Lint & Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: server
      - run: npm run lint
        working-directory: server
      - run: npm run build
        working-directory: server
